<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
    <defs>
        <linearGradient id="colorfulGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#29b6f6; stop-opacity:1" />
            <stop offset="50%" style="stop-color:#00bcd4; stop-opacity:1" />
            <stop offset="100%" style="stop-color:#26a69a; stop-opacity:1" />
        </linearGradient>

        <filter id="dropShadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
            <feOffset dx="2" dy="2" result="offsetblur"/>
            <feFlood flood-color="#333" flood-opacity="0.5"/>
            <feComposite in2="offsetblur" operator="in"/>
            <feMerge>
                <feMergeNode/>
                <feMergeNode in="SourceGraphic"/>
            </feMerge>
        </filter>
    </defs>

    <path
        d="M 20,25 H 80 V 35 H 58 V 65 H 80 V 75 H 20 V 65 H 42 V 35 H 20 V 25 Z"
        fill="url(#colorfulGradient)"
        stroke="#1a237e"
        stroke-width="1"
        filter="url(#dropShadow)"
    />

    <rect x="47" y="40" width="6" height="20" fill="#ffffff" rx="1.5"/>
    <rect x="40" y="47" width="20" height="6" fill="#ffffff" rx="1.5"/>
</svg>
